<mat-form-field style="width: 100%;">
  <mat-label>Filter users</mat-label>
  <input matInput (input)="applyFilter($event)" [placeholder]="'Filter users' | i18next" />
</mat-form-field>

<table mat-table [dataSource]="users" matSort class="mat-elevation-z8">
  <ng-container matColumnDef="name">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
    <td mat-cell *matCellDef="let user">{{ user.name }}</td>
  </ng-container>

  <ng-container matColumnDef="role">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Role</th>
    <td mat-cell *matCellDef="let user">{{ user.role }}</td>
  </ng-container>

  <ng-container matColumnDef="protectedProjects">
    <th mat-header-cell *matHeaderCellDef mat-sort-header>Protected Projects</th>
    <td mat-cell *matCellDef="let user">{{ user.protectedProjects }}</td>
  </ng-container>

  <ng-container matColumnDef="favorite">
    <th mat-header-cell *matHeaderCellDef>Favorite</th>
    <td mat-cell *matCellDef="let user">
      <div *ngIf="user.favorite">YES</div>
      <div *ngIf="!user.favorite">NO</div>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  <tr
    mat-row
    *matRowDef="let row; columns: displayedColumns"
    (click)="userDetails(row)"
    style="cursor: pointer;"
  ></tr>
</table>

<mat-paginator 
  #paginator
  [pageSizeOptions]="[5, 10, 25, 50]"
  showFirstLastButtons>
</mat-paginator>
