<div class="user">
  <h3>Username: {{userUsername}}</h3>
  <h4>Protected projects: {{userProtectedProjects}}</h4>
  <div class="buttons">
    <button (click)="synchronizeUser()">Synchronize</button>
    <button *ngIf="(isFavorite$ | async)" (click)="removeFromFavorites()">Remove from favorites</button>
    <button *ngIf="!(isFavorite$ | async)" (click)="addToFavorites()">Add to favorites</button>
  </div>

  <button (click)="goBack()" class="go-back">Go back to list</button>
</div>
